<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta
		name="viewport"
		content="width=device-width, initial-scale=1.0"
	>
	<title>Lancer Roadmap</title>
	<script>
		(() => {
			const storedTheme = localStorage.getItem("lancer-roadmap-theme");
			const theme = ["gms-light", "gms-dark"].includes(storedTheme)
				? storedTheme
				: window.matchMedia("(prefers-color-scheme: dark)").matches
					? "gms-dark"
					: "gms-light";

			document.documentElement.dataset.theme = theme;
		})();
	</script>
	<link rel="stylesheet" href="/src/styles/app.css">
</head>
<body>
	<main id="app">
		<header class="name-toolbar">
			<input
				id="roadmap-name"
				class="namebar"
				type="text"
				aria-label="Lancer roadmap name">

			<label class="max-ll-select">
				Maximum LL
				<input
					id="roadmap-max-level"
					type="number"
					min="0"
					max="12"
					step="1">
			</label>

			<button
				id="theme-toggle"
				class="theme-toggle"
				type="button"
				aria-pressed="false">
				<span>Theme</span>
				<strong>GMS Light</strong>
			</button>
		</header>
		<section class="roadmap-shell">
			<aside
				class="level-rail"
				aria-label="License levels">
				<div id="level-tabs" class="level-tabs"></div>
			</aside>

			<div class="roadmap-container">
				<table id="roadmap-table" class="roadmap-table">
					<thead>
						<tr>
						<th scope="col">Level Up</th>
						<th scope="col">Active Frame</th>
						<th scope="col" class="non-cell"></th>
						<th scope="col">H</th>
						<th scope="col">A</th>
						<th scope="col">S</th>
						<th scope="col">E</th>
						<th scope="col" class="non-cell"></th>
						<th scope="col" class="stat-header"><span>Size</span></th>
						<th scope="col" class="stat-header"><span>HP</span></th>
						<th scope="col" class="stat-header"><span>Armor</span></th>
						<th scope="col" class="stat-header"><span>Heat Cap</span></th>
						<th scope="col" class="stat-header"><span>Evasion</span></th>
						<th scope="col" class="stat-header"><span>Speed</span></th>
						<th scope="col" class="stat-header"><span>E-Defense</span></th>
						<th scope="col" class="stat-header"><span>Tech Attack</span></th>
						<th scope="col" class="stat-header"><span>Sensors</span></th>
						<th scope="col" class="stat-header"><span>Repair Cap</span></th>
						<th scope="col" class="stat-header"><span>Save</span></th>
						<th scope="col" class="stat-header"><span>SP</span></th>
						<th scope="col" class="non-cell"></th>
						<th scope="col">Mounts</th>
						<th scope="col" class="non-cell"></th>
						<th scope="col">Systems</th>
						</tr>
					</thead>

					<tbody id="roadmap-body"></tbody>
				</table>
			</div>
		</section>
	</main>

	<script type="module" src="/src/main.js"></script>
</body>
</html>
